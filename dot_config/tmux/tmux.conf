# Forward ghostty's capabilities through tmux (truecolor, links, undercurl, etc.)
set -g default-terminal "tmux-256color"
set -sa terminal-features ",*:RGB:hyperlinks:usstyle:ccolour:cstyle:strikethrough:overline:sync:extkeys:osc7:clipboard:sixel"

set -g default-shell /opt/homebrew/bin/fish

# GUI-launched servers get a bare PATH; run-shell/popups need homebrew on it
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
set -g mouse on
# Let apps emit raw escapes (image protocols, OSC sequences) through tmux
set -g allow-passthrough on
set -g history-limit 100000
set -s escape-time 0
set -g set-clipboard on

# Ghostty-like: mouse drag selects and holds the highlight without copying.
# Copy explicitly with y (keeps highlight) or Enter (copies and exits).
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection
bind -T copy-mode    MouseDragEnd1Pane send-keys -X stop-selection
bind -T copy-mode-vi y send-keys -X copy-selection-no-clear
bind -T copy-mode    y send-keys -X copy-selection-no-clear
# prefix y (sent by ghostty cmd+c): copy selection, keep highlight; no-op outside copy mode
bind y if -F '#{pane_in_mode}' { send-keys -X copy-selection-no-clear }
# Ghostty-like: single click dismisses selection and leaves copy mode
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X cancel
bind -T copy-mode    MouseDown1Pane select-pane \; send-keys -X cancel

# Forward drag/double/triple-click to the app only when it tracks motion (1002/1003, e.g. vim).
# Wheel-only apps (mode 1000, e.g. Claude Code) get tmux selection instead.
bind -T root MouseDrag1Pane if -F '#{||:#{pane_in_mode},#{||:#{mouse_button_flag},#{mouse_all_flag}}}' { send-keys -M } { copy-mode -M }
bind -T root DoubleClick1Pane select-pane -t = \; if -F '#{||:#{pane_in_mode},#{||:#{mouse_button_flag},#{mouse_all_flag}}}' { send-keys -M } { copy-mode -H ; send-keys -X select-word }
bind -T root TripleClick1Pane select-pane -t = \; if -F '#{||:#{pane_in_mode},#{||:#{mouse_button_flag},#{mouse_all_flag}}}' { send-keys -M } { copy-mode -H ; send-keys -X select-line }

# Windows/panes numbered from 1, renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Killing a session switches to the next one instead of detaching (needed for sesh)
set -g detach-on-destroy off

# Dracula theme; status-left turns pink while prefix is active
set -g status-style "bg=#191a21,fg=#f8f8f2"
set -g status-left-length 40
set -g status-left "#[bg=#{?client_prefix,#ff79c6,#50fa7b},fg=#282a36,bold] #S #[default] "
set -g status-right ""
set -g window-status-format "#[fg=#6272a4] #I:#W "
set -g window-status-current-format "#[bg=#44475a,fg=#bd93f9,bold] #I:#W "
set -g window-status-activity-style "fg=#f1fa8c"
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"
# Dim inactive panes; active pane keeps true Dracula bg
set -g window-style "bg=#21222c"
set -g window-active-style "bg=#282a36"
set -g message-style "bg=#44475a,fg=#f8f8f2"
set -g mode-style "bg=#44475a,fg=#f8f8f2"
set -g popup-border-style "fg=#bd93f9"
set -g clock-mode-colour "#bd93f9"

# prefix T: sesh session picker
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --color 'fg:#f8f8f2,bg:#282a36,hl:#bd93f9,fg+:#f8f8f2,bg+:#44475a,hl+:#bd93f9' \
    --color 'info:#ffb86c,prompt:#50fa7b,pointer:#ff79c6,marker:#ff79c6,spinner:#ffb86c,header:#6272a4,border:#bd93f9,label:#f8f8f2' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# prefix L: jump to last session
bind -N "last-session (via sesh)" L run-shell "sesh last"

# prefix E: equalize pane sizes without reflowing the layout
bind -N "equalize panes evenly" E select-layout -E
